<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AQYMO — Pré-audit immobilier</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8f7f4; --surface: #ffffff; --border: #e4e2db; --border-strong: #c8c6be;
      --text: #1a1a18; --text-secondary: #5c5b57; --text-muted: #9c9a94; --radius: 8px;
      --gold: #B8962E; --gold-light: #D4B483; --gold-bg: #faf6ee; --gold-border: #e8d9b5;
      --danger-bg: #fef2f2; --danger-text: #991b1b; --danger-border: #fecaca;
      --success-bg: #f0fdf4; --success-text: #166534; --success-border: #bbf7d0;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 680px; margin: 0 auto; }
    .logo-block { text-align: center; margin-bottom: 2.5rem; }
    .logo-img { height: 100px; width: auto; mix-blend-mode: multiply; }
    .steps { display: flex; align-items: center; gap: 8px; margin-bottom: 2rem; }
    .step { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted); }
    .step.active { color: var(--text); }
    .step.done { color: var(--success-text); }
    .step-num { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--border-strong); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; }
    .step.active .step-num { background: var(--gold); color: white; border-color: var(--gold); }
    .step.done .step-num { background: var(--success-bg); border-color: var(--success-border); color: var(--success-text); }
    .step-line { flex: 1; height: 1px; background: var(--border); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .section-label { font-size: 11px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 1rem; }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 5px; }
    .field label span { color: var(--gold); }
    .field input, .field select, .field textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; font-family: 'Inter', sans-serif; color: var(--text); background: white; transition: border-color 0.15s; outline: none; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(184,150,46,0.08); }
    .field input.error, .field select.error { border-color: #ef4444; }
    .field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .divider { height: 1px; background: var(--border); margin: 1.25rem 0; }
    .required-note { font-size: 11px; color: var(--text-muted); margin-bottom: 1rem; }
    .btn { width: 100%; padding: 13px; background: var(--gold); color: white; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; transition: opacity 0.15s; letter-spacing: 0.02em; }
    .btn:hover { opacity: 0.88; }
    .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .upload-zone, .photos-zone { border: 1.5px dashed var(--gold-border); border-radius: var(--radius); padding: 1rem; text-align: center; cursor: pointer; transition: all 0.15s; position: relative; background: var(--gold-bg); }
    .upload-zone:hover, .photos-zone:hover { border-color: var(--gold); background: #f5eedb; }
    .upload-zone.has-files, .photos-zone.has-files { border-color: var(--success-text); background: var(--success-bg); }
    .upload-zone input[type="file"], .photos-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-icon { font-size: 20px; margin-bottom: 4px; }
    .upload-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
    .upload-hint { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .upload-count { font-size: 12px; color: var(--success-text); font-weight: 500; margin-top: 4px; }
    .loading { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 3rem 0; text-align: center; }
    .spinner { width: 36px; height: 36px; border: 2px solid var(--gold-border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-msg { font-size: 14px; color: var(--text-secondary); font-weight: 500; }
    .loading-sub { font-size: 12px; color: var(--text-muted); }
    .error-msg { background: var(--danger-bg); border: 1px solid var(--danger-border); color: var(--danger-text); padding: 12px 16px; border-radius: var(--radius); font-size: 14px; margin-bottom: 1rem; }
    .confirm-box { text-align: center; padding: 3rem 1rem; }
    .confirm-icon { font-size: 48px; margin-bottom: 1rem; }
    .confirm-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 500; color: var(--text); margin-bottom: 1.25rem; }
    .confirm-adresse { display: inline-block; background: var(--gold-bg); border: 1px solid var(--gold-border); color: var(--gold); padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; margin-bottom: 1.5rem; }
    .confirm-msg { font-size: 15px; color: var(--text-secondary); line-height: 1.7; max-width: 480px; margin: 0 auto 1.5rem; }
    .confirm-divider { height: 1px; background: var(--border); margin: 1.5rem 0; }
    .confirm-footer { font-size: 12px; color: var(--text-muted); }
    @media (max-width: 520px) { .row, .upload-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="container">
  <div class="logo-block">
    <img src="logo_aqymo.png" alt="AQYMO" class="logo-img" />
  </div>

  <div class="steps">
    <div class="step active" id="s1"><div class="step-num">1</div><span>Mon bien</span></div>
    <div class="step-line"></div>
    <div class="step" id="s2"><div class="step-num">2</div><span>Confirmation</span></div>
  </div>

  <div id="error-box" class="error-msg" style="display:none"></div>

  <div id="form-view">
    <div class="card">
      <div class="section-label">Le bien</div>
      <div class="field">
        <label>Adresse complète</label>
        <input type="text" id="adresse" placeholder="Ex: 12 rue des Lilas, 69003 Lyon" />
      </div>
      <div class="row">
        <div class="field"><label>Prix annonce (€)</label><input type="text" id="prix" placeholder="285000" /></div>
        <div class="field"><label>Surface (m²)</label><input type="text" id="surface" placeholder="87" /></div>
      </div>
      <div class="row">
        <div class="field">
          <label>Type de bien</label>
          <select id="type_bien">
            <option value="">Sélectionner</option>
            <option value="maison">Maison individuelle</option>
            <option value="appartement">Appartement</option>
            <option value="immeuble">Immeuble</option>
          </select>
        </div>
        <div class="field"><label>Année de construction</label><input type="text" id="annee" placeholder="1975" /></div>
      </div>
      <div class="divider"></div>
      <div class="section-label">Documents</div>
      <div class="upload-grid">
        <div class="upload-zone" id="zone-dpe">
          <input type="file" id="file-dpe" accept="image/*" onchange="handleFile('dpe', this)" />
          <div class="upload-icon">📄</div>
          <div class="upload-label">DPE</div>
          <div class="upload-hint">Photo ou scan</div>
          <div class="upload-count" id="count-dpe"></div>
        </div>
        <div class="upload-zone" id="zone-annonce">
          <input type="file" id="file-annonce" accept="image/*" onchange="handleFile('annonce', this)" />
          <div class="upload-icon">📋</div>
          <div class="upload-label">Annonce</div>
          <div class="upload-hint">Photo ou capture</div>
          <div class="upload-count" id="count-annonce"></div>
        </div>
      </div>
      <div class="photos-zone" id="zone-photos">
        <input type="file" id="file-photos" accept="image/*" multiple onchange="handleFile('photos', this)" />
        <div class="upload-icon">📷</div>
        <div class="upload-label">Photos du bien</div>
        <div class="upload-hint">Plusieurs photos acceptées</div>
        <div class="upload-count" id="count-photos"></div>
      </div>
      <div class="divider"></div>
      <div class="section-label">Contexte</div>
      <div class="row">
        <div class="field">
          <label>Classe DPE déclarée</label>
          <select id="dpe_classe">
            <option value="">Inconnue</option>
            <option value="A">A</option><option value="B">B</option><option value="C">C</option>
            <option value="D">D</option><option value="E">E</option><option value="F">F</option><option value="G">G</option>
          </select>
        </div>
        <div class="field">
          <label>Projet</label>
          <select id="projet_client">
            <option value="">Non renseigné</option>
            <option value="residence_principale">Résidence principale</option>
            <option value="locatif">Investissement locatif</option>
            <option value="renovation">Rénovation globale</option>
            <option value="extension">Extension / division</option>
          </select>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section-label">Vos coordonnées</div>
      <p class="required-note">Les champs marqués <span style="color:var(--gold)">*</span> sont obligatoires</p>
      <div class="field">
        <label>Email <span>*</span></label>
        <input type="email" id="email_client" placeholder="votre@email.fr" />
      </div>
      <div class="field">
        <label>Téléphone <span>*</span></label>
        <input type="tel" id="tel_client" placeholder="06 12 34 56 78" />
      </div>
      <div class="field">
        <label>Notes et observations</label>
        <textarea id="notes_client" placeholder="Ex : inquiets pour la toiture, budget travaux max 40k€..."></textarea>
      </div>
    </div>
    <button class="btn" onclick="lancerAnalyse()">Lancer l'expertise architecte →</button>
  </div>

  <div id="loading-view" style="display:none">
    <div class="loading">
      <div class="spinner"></div>
      <p class="loading-msg">Enregistrement de votre demande...</p>
      <p class="loading-sub">Merci de patienter quelques instants</p>
    </div>
  </div>

  <div id="result-view" style="display:none"></div>
</div>

<script>
const uploadedFiles = { dpe: [], annonce: [], photos: [] };

function handleFile(type, input) {
  const files = Array.from(input.files);
  uploadedFiles[type] = files;
  const zone = document.getElementById('zone-' + type);
  const count = document.getElementById('count-' + type);
  if (files.length > 0) {
    zone.classList.add('has-files');
    count.textContent = files.length === 1 ? files[0].name.slice(0, 25) : files.length + ' photos';
  }
}

async function fileToBase64(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve({ nom: file.name, data: e.target.result.split(',')[1], mediaType: file.type, type: 'image' });
    reader.readAsDataURL(file);
  });
}

async function lancerAnalyse() {
  const adresse = document.getElementById('adresse').value.trim();
  const email = document.getElementById('email_client').value.trim();
  const tel = document.getElementById('tel_client').value.trim();

  if (!adresse) { showError("Merci de renseigner l'adresse du bien."); return; }
  if (!email) { showError("Merci de renseigner votre email — il est nécessaire pour vous envoyer la confirmation."); document.getElementById('email_client').classList.add('error'); return; }
  if (!email.includes('@')) { showError("L'adresse email semble invalide."); document.getElementById('email_client').classList.add('error'); return; }
  if (!tel) { showError("Merci de renseigner votre téléphone — l'architecte en aura besoin pour vous contacter."); document.getElementById('tel_client').classList.add('error'); return; }

  hideError();
  document.getElementById('email_client').classList.remove('error');
  document.getElementById('tel_client').classList.remove('error');
  document.getElementById('form-view').style.display = 'none';
  document.getElementById('loading-view').style.display = 'block';

  const fichiers = [];
  for (const type of ['dpe', 'annonce', 'photos']) {
    for (const file of uploadedFiles[type]) {
      if (file.size <= 3 * 1024 * 1024) {
        const f = await fileToBase64(file);
        f.categorie = type;
        fichiers.push(f);
      }
    }
  }

  const body = {
    adresse,
    prix: document.getElementById('prix').value,
    surface: document.getElementById('surface').value,
    type_bien: document.getElementById('type_bien').value,
    annee: document.getElementById('annee').value,
    dpe_classe: document.getElementById('dpe_classe').value,
    notes_client: document.getElementById('notes_client').value.trim(),
    email_client: email,
    tel_client: tel,
    projet_client: document.getElementById('projet_client').value,
    fichiers: fichiers.slice(0, 5)
  };

  try {
    const res = await fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) { const err = await res.json(); throw new Error(err.error || 'Erreur serveur'); }
    const result = await res.json();
    afficherConfirmation(adresse, email, tel);
  } catch (e) {
    document.getElementById('loading-view').style.display = 'none';
    document.getElementById('form-view').style.display = 'block';
    showError("Erreur : " + e.message);
  }
}

function afficherConfirmation(adresse, email, tel) {
  document.getElementById('loading-view').style.display = 'none';
  setStep(2);
  document.getElementById('result-view').innerHTML = `
    <div class="card">
      <div class="confirm-box">
        <div class="confirm-icon">✅</div>
        <div class="confirm-title">Demande bien reçue</div>
        <div class="confirm-adresse">📍 ${adresse}</div>
        <p class="confirm-msg">Merci de nous avoir remis les données correspondant à votre bien. Un architecte certifié prendra contact avec vous dans les 48 prochaines heures pour fixer un rendez-vous vous convenant.</p>
        <p style="font-size:13px;color:var(--text-muted);margin-bottom:4px">Confirmation envoyée à <strong>${email}</strong></p>
        <p style="font-size:13px;color:var(--text-muted)">L'architecte vous contactera au <strong>${tel}</strong></p>
        <div class="confirm-divider"></div>
        <p class="confirm-footer">AQYMO — Sécurisez votre acquisition immo</p>
      </div>
    </div>`;
  document.getElementById('result-view').style.display = 'block';
  window.scrollTo(0, 0);
}

function setStep(n) {
  for (let i = 1; i <= 2; i++) {
    const el = document.getElementById('s' + i);
    el.className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
  }
}

function showError(msg) { const el = document.getElementById('error-box'); el.textContent = msg; el.style.display = 'block'; window.scrollTo(0, 0); }
function hideError() { document.getElementById('error-box').style.display = 'none'; }
</script>
</body>
</html>
