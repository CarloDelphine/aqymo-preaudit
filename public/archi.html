<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AQYMO — Saisie terrain</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8f7f4; --surface: #ffffff; --border: #e4e2db; --border-strong: #c8c6be;
      --text: #1a1a18; --text-secondary: #5c5b57; --text-muted: #9c9a94; --radius: 8px;
      --gold: #B8962E; --gold-bg: #faf6ee; --gold-border: #e8d9b5;
      --danger-bg: #fef2f2; --danger-text: #991b1b; --danger-border: #fecaca;
      --warning-bg: #fffbeb; --warning-text: #92400e;
      --success-bg: #f0fdf4; --success-text: #166534; --success-border: #bbf7d0;
      --red: #ef4444; --orange: #f59e0b; --green: #22c55e;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .header { background: var(--text); color: white; padding: 0.75rem 1.25rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .header img { height: 32px; width: auto; mix-blend-mode: screen; }
    .header-tag { font-size: 11px; color: #888; margin-left: 8px; }
    .offline-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #333; color: #aaa; }
    .offline-badge.online { background: var(--success-bg); color: var(--success-text); }
    .mission-bar { background: var(--gold-bg); border-bottom: 1px solid var(--gold-border); padding: 0.75rem 1.25rem; }
    .mission-select { width: 100%; padding: 8px 12px; border: 1px solid var(--gold-border); border-radius: var(--radius); font-size: 14px; font-family: 'Inter', sans-serif; background: white; color: var(--text); outline: none; }
    .mission-select:focus { border-color: var(--gold); }
    .section-nav { display: flex; overflow-x: auto; gap: 0; background: var(--surface); border-bottom: 1px solid var(--border); scrollbar-width: none; }
    .section-nav::-webkit-scrollbar { display: none; }
    .nav-btn { flex-shrink: 0; padding: 10px 14px; font-size: 12px; font-weight: 500; color: var(--text-muted); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; font-family: 'Inter', sans-serif; }
    .nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .content { padding: 1rem 1.25rem; max-width: 760px; margin: 0 auto; padding-bottom: 100px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
    .card-title { font-size: 11px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem; }
    .briefing-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .briefing-item:last-child { border-bottom: none; }
    .briefing-label { color: var(--text-muted); min-width: 140px; flex-shrink: 0; }
    .briefing-value { color: var(--text); font-weight: 500; }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 5px; }
    .field input, .field select, .field textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; font-family: 'Inter', sans-serif; color: var(--text); background: white; outline: none; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--gold); }
    .field textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .score-group { display: flex; gap: 8px; }
    .score-btn { flex: 1; padding: 10px 6px; border-radius: var(--radius); border: 1.5px solid var(--border); background: white; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; text-align: center; }
    .score-btn.bon { color: var(--success-text); }
    .score-btn.bon.active { background: var(--success-bg); border-color: var(--success-text); }
    .score-btn.moyen { color: var(--warning-text); }
    .score-btn.moyen.active { background: var(--warning-bg); border-color: var(--orange); }
    .score-btn.mauvais { color: var(--danger-text); }
    .score-btn.mauvais.active { background: var(--danger-bg); border-color: var(--red); }
    .score-btn.nd { color: var(--text-muted); }
    .score-btn.nd.active { background: var(--bg); border-color: var(--border-strong); }

    /* SCORING 5 PILIERS */
    .pilier-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 1rem; }
    .pilier { text-align: center; padding: 10px 6px; border-radius: var(--radius); border: 1px solid var(--border); }
    .pilier.vert { background: var(--success-bg); border-color: var(--success-border); }
    .pilier.orange { background: var(--warning-bg); border-color: #fde68a; }
    .pilier.rouge { background: var(--danger-bg); border-color: var(--danger-border); }
    .pilier.neutre { background: var(--bg); }
    .pilier-icon { font-size: 18px; margin-bottom: 4px; }
    .pilier-label { font-size: 9px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
    .pilier-score { font-size: 11px; font-weight: 700; margin-top: 2px; }
    .pilier.vert .pilier-score { color: var(--success-text); }
    .pilier.orange .pilier-score { color: var(--warning-text); }
    .pilier.rouge .pilier-score { color: var(--danger-text); }

    /* TRAVAUX */
    .travaux-item { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
    .travaux-header { display: flex; align-items: center; gap: 10px; padding: 10px 12px; cursor: pointer; background: white; }
    .travaux-header:hover { background: var(--bg); }
    .travaux-check { width: 18px; height: 18px; border: 2px solid var(--border-strong); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .travaux-check.checked { background: var(--gold); border-color: var(--gold); }
    .travaux-check.checked::after { content: '✓'; color: white; font-size: 11px; font-weight: 700; }
    .travaux-code { font-size: 10px; font-weight: 700; color: var(--text-muted); min-width: 36px; }
    .travaux-nom { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; }
    .travaux-fourchette { font-size: 11px; color: var(--gold); font-weight: 500; white-space: nowrap; }
    .travaux-detail { padding: 10px 12px; background: var(--gold-bg); border-top: 1px solid var(--gold-border); display: none; }
    .travaux-detail.open { display: block; }
    .travaux-declencheur { font-size: 12px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 10px; font-style: italic; }

    /* TABLE POSTES */
    .postes-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 10px; }
    .postes-table th { text-align: left; padding: 6px 8px; background: var(--bg); color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
    .postes-table td { padding: 7px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .postes-table tr:last-child td { border-bottom: none; }
    .prio-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .prio-dot.rouge { background: var(--red); }
    .prio-dot.orange { background: var(--orange); }
    .prio-dot.jaune { background: #eab308; }
    .prio-dot.vert { background: var(--green); }
    .prio-dot.gris { background: #94a3b8; }
    .prix-input { width: 110px; padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; font-family: 'Inter', sans-serif; }
    .prix-input:focus { border-color: var(--gold); outline: none; }

    .fourchette-globale { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-top: 1px solid var(--gold-border); margin-top: 6px; }
    .fourchette-globale span { font-size: 12px; color: var(--text-secondary); }
    .fourchette-globale strong { font-size: 13px; color: var(--gold); }

    .prio-group { display: flex; gap: 6px; margin-bottom: 8px; }
    .prio-btn { flex: 1; padding: 6px; border-radius: 4px; border: 1px solid var(--border); background: white; font-size: 11px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
    .prio-btn.p1.active { background: var(--danger-bg); border-color: var(--red); color: var(--danger-text); }
    .prio-btn.p2.active { background: var(--warning-bg); border-color: var(--orange); color: var(--warning-text); }
    .prio-btn.p3.active { background: var(--gold-bg); border-color: var(--gold-border); color: var(--gold); }
    .travaux-note { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; font-family: 'Inter', sans-serif; resize: none; outline: none; min-height: 50px; background: white; margin-top: 8px; }

    /* SUGGESTION TRAVAUX */
    .suggestion-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; padding: 2px 8px; border-radius: 10px; background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; font-weight: 600; margin-left: 6px; }

    /* PHOTOS */
    .photo-zone { border: 1.5px dashed var(--gold-border); border-radius: var(--radius); padding: 1rem; text-align: center; cursor: pointer; position: relative; background: var(--gold-bg); margin-bottom: 8px; }
    .photo-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 8px; }
    .photo-thumb { position: relative; aspect-ratio: 1; border-radius: 6px; overflow: hidden; }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .photo-thumb .del { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    /* ENVELOPPE */
    .enveloppe-bar { background: var(--surface); border: 1px solid var(--gold-border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .enveloppe-title { font-size: 11px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.75rem; }
    .enveloppe-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; }
    .enveloppe-num { font-size: 20px; font-weight: 600; color: var(--text); }
    .enveloppe-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    /* VIGILANCE */
    .vigilance-list { list-style: none; }
    .vigilance-item { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.5; }
    .vigilance-item:last-child { border-bottom: none; }
    .dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
    .dot-red { background: var(--red); }
    .dot-orange { background: var(--orange); }
    .dot-green { background: var(--green); }
    .dot-gold { background: var(--gold); }

    /* BOTTOM BAR */
    .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--text); padding: 0.75rem 1.25rem; display: flex; align-items: center; gap: 10px; z-index: 100; }
    .save-btn { flex: 1; padding: 11px; background: var(--gold); color: white; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; }
    .save-status { font-size: 11px; color: #888; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
    .save-dot { width: 6px; height: 6px; border-radius: 50%; background: #555; flex-shrink: 0; }
    .save-dot.saved { background: var(--green); }
    .empty { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
    .spinner { width: 32px; height: 32px; border: 2px solid var(--gold-border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 520px) { .row, .row-3 { grid-template-columns: 1fr; } .enveloppe-grid { grid-template-columns: 1fr; } .pilier-grid { grid-template-columns: repeat(3, 1fr); } }
  </style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center">
    <img src="logo_aqymo.png" alt="AQYMO" />
    <span class="header-tag">Saisie terrain</span>
  </div>
  <div class="offline-badge" id="network-badge">⚡ Hors ligne</div>
</div>

<div class="mission-bar">
  <select class="mission-select" id="mission-select" onchange="chargerMission(this.value)">
    <option value="">— Sélectionner une mission —</option>
  </select>
</div>

<div class="section-nav" id="section-nav" style="display:none">
  <button class="nav-btn active" onclick="afficherSection('briefing',this)">📋 Briefing</button>
  <button class="nav-btn" onclick="afficherSection('general',this)">🏠 Général</button>
  <button class="nav-btn" onclick="afficherSection('structure',this)">🧱 Structure</button>
  <button class="nav-btn" onclick="afficherSection('toiture',this)">🏗 Toiture</button>

  <button class="nav-btn" onclick="afficherSection('interieurs',this)">🛋 Intérieurs</button>
  <button class="nav-btn" onclick="afficherSection('pathologies',this)">⚠️ Pathologies</button>
  <button class="nav-btn" onclick="afficherSection('travaux',this)">🔧 Travaux</button>
  <button class="nav-btn" onclick="afficherSection('synthese',this)">📊 Synthèse</button>
</div>

<div class="content" id="content">
  <div class="empty">
    <div style="font-size:36px;margin-bottom:1rem">📱</div>
    <p>Sélectionnez une mission pour commencer la saisie terrain</p>
  </div>
</div>

<div class="bottom-bar" id="bottom-bar" style="display:none">
  <div class="save-status">
    <div class="save-dot" id="save-dot"></div>
    <span id="save-status-txt">Non sauvegardé</span>
  </div>
  <button class="save-btn" onclick="sauvegarder()">💾 Sauvegarder</button>
</div>

<script>

function initDB() {
  return new Promise((resolve) => {
    const req = indexedDB.open('aqymo_terrain', 2);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('saisies')) d.createObjectStore('saisies', { keyPath: 'missionId' });
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(); };
    req.onerror = () => resolve();
  });
}

function dbSave(data) {
  return new Promise((resolve) => {
    if (!db) return resolve();
    const tx = db.transaction('saisies', 'readwrite');
    tx.objectStore('saisies').put(data);
    tx.oncomplete = resolve;
    tx.onerror = resolve;
  });
}

function dbGet(key) {
  return new Promise((resolve) => {
    if (!db) return resolve(null);
    const tx = db.transaction('saisies', 'readonly');
    const req = tx.objectStore('saisies').get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => resolve(null);
  });
}

async function chargerListeMissions() {
  try {
    const res = await fetch('/api/briefing?t=' + Date.now());
    if (!res.ok) return;
    const data = await res.json();
    const select = document.getElementById('mission-select');
    select.innerHTML = '<option value="">— Sélectionner une mission —</option>';
    (data.missions || []).forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.missionId;
      const statut = m._status === 'ready' ? '✅' : m._status === 'error' ? '❌' : '⏳';
      const date = m.createdAt ? new Date(m.createdAt).toLocaleDateString('fr-FR') : '';
      opt.textContent = `${statut} ${m.adresse || 'Mission'} — ${date}`;
      select.appendChild(opt);
    });
  } catch (e) {}
}

async function chargerMission(missionId) {
  if (!missionId) return;
  document.getElementById('section-nav').style.display = 'none';
  document.getElementById('bottom-bar').style.display = 'none';
  document.getElementById('content').innerHTML = `<div class="empty"><div class="spinner"></div><p>Chargement...</p></div>`;

  try {
    const local = await dbGet(missionId);
    if (local?.briefing?._status === 'ready') {
      currentMission = local.briefing;
      saisie = local.saisie || {};
      travauxCoches = local.travauxCoches || {};
      photosData = local.photosData || {};
      prixModifies = local.prixModifies || {};
      afficherMission();
      return;
    }

    const res = await fetch(`/api/briefing?id=${missionId}&t=${Date.now()}`);
    const data = await res.json();

    if (data._status === 'ready') {
      currentMission = data; saisie = {}; travauxCoches = {}; photosData = {}; prixModifies = {};
      afficherMission(); return;
    }
    if (data._status === 'error') {
      document.getElementById('content').innerHTML = `<div class="empty"><p>❌ Erreur : ${data.error}</p></div>`; return;
    }

    document.getElementById('content').innerHTML = `<div class="empty"><div class="spinner"></div><p style="margin-bottom:8px;font-weight:500">Analyse IA en cours...</p><p style="font-size:12px;color:var(--text-muted)">Interrogation des bases officielles + IA<br>Merci de patienter 1-2 minutes</p></div>`;

    try {
      await fetch('/api/process', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ missionId }) });
    } catch (e) {}

    const r2 = await fetch(`/api/briefing?id=${missionId}&t=${Date.now()}`);
    const d2 = await r2.json();

    if (d2._status === 'ready') {
      currentMission = d2; saisie = {}; travauxCoches = {}; photosData = {}; prixModifies = {};
      afficherMission();
    } else {
      document.getElementById('content').innerHTML = `<div class="empty"><p>❌ Analyse incomplète — réessayez dans quelques instants</p></div>`;
    }
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="empty"><p>❌ ${e.message}</p></div>`;
  }
}

function renderPathologies() {
  // Suggestions automatiques basées sur les pathologies
  const suggestions = new Set();
  Object.entries(PATHOLOGIE_TRAVAUX).forEach(([pathologie, codes]) => {
    Object.values(saisie).forEach(val => {
      if (val === pathologie) codes.forEach(c => suggestions.add(c));
    });
  });

  const suggestionsHTML = suggestions.size > 0 ? `
    <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 12px;margin-bottom:1rem">
      <p style="font-size:12px;font-weight:600;color:#1e40af;margin-bottom:6px">💡 Travaux suggérés automatiquement</p>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${[...suggestions].map(code => {
          const t = BIBLIOTHEQUE.find(x=>x.code===code);
          return t ? `<span style="font-size:11px;padding:3px 10px;border-radius:10px;background:white;border:1px solid #bfdbfe;color:#1e40af;font-weight:500">${code} — ${t.nom}</span>` : '';
        }).join('')}
      </div>
    </div>` : '';

  return `<div class="card"><div class="card-title">⚠️ Pathologies détectées</div>
    ${suggestionsHTML}
    ${sel('pathologie_humidite','Humidité',['Aucune','Légère condensation','Remontées capillaires','Infiltrations toiture','Infiltrations façade','Dégâts importants'])}
    ${sel('pathologie_fissures','Fissures',['Aucune','Fissures capillaires (esthétique)','Fissures non évolutives','Fissures évolutives (structurel)','Lézardes (urgence BET)'])}
    ${sel('pathologie_amiante','Présence amiante suspectée',['Non','Possible (dalles sol)','Possible (flocage plafond)','Possible (fibrociment toiture)','Diagnostic requis'])}
    ${sel('pathologie_plomb','Présence plomb suspectée',['Non','Possible (canalisations)','Possible (peintures anciennes)','CREP requis'])}
    ${sel('pathologie_termites','Termites / xylophages',['Non','Zone à risque','Traces suspectes','Confirmé'])}
    ${sel('pathologie_radon','Radon',['Non testé','Zone à risque faible','Zone à risque élevé'])}
    ${sel('pathologie_ventilation','Problème ventilation',['Aucun','Humidité chronique','Moisissures','Odeurs','VMC absente ou HS'])}
    ${txt('obs_pathologies','Observations pathologies','Localisation précise, urgence, photos associées...')}
  </div>${photoCard('pathologies')}`;
}

function renderTravaux() {
  // Calcule les suggestions depuis les pathologies
  const suggestions = new Set();
  Object.entries(PATHOLOGIE_TRAVAUX).forEach(([pathologie, codes]) => {
    Object.values(saisie).forEach(val => {
      if (val === pathologie) codes.forEach(c => suggestions.add(c));
    });
  });

  const categories = [
    { id:'structure', label:'🧱 Structure & Gros œuvre' },
    { id:'toiture', label:'🏗 Toiture' },
    { id:'facades', label:'🪟 Façades & Menuiseries' },
    { id:'energie', label:'⚡ Rénovation énergétique' },
    { id:'electricite', label:'🔌 Installations techniques' },
    { id:'plomberie', label:'🚿 Plomberie' },
    { id:'interieurs', label:'🛋 Aménagements intérieurs' },
    { id:'exterieurs', label:'🌿 Extérieur & Abords' },
    { id:'pathologies', label:'⚠️ Traitement pathologies' },
  ];

  let html = '';
  categories.forEach(cat => {
    const items = BIBLIOTHEQUE.filter(t => t.categorie === cat.id);
    if (!items.length) return;
    html += `<div class="card"><div class="card-title">${cat.label}</div>`;
    items.forEach(t => {
      const checked = travauxCoches[t.code]?.checked;
      const prio = travauxCoches[t.code]?.priorite || '';
      const isSuggested = suggestions.has(t.code) && !checked;

      // Calcul fourchette avec prix modifiés
      let totalMin = 0, totalMax = 0;
      t.postes.forEach(p => {
        const key = `${t.code}_${p.nom}`;
        const minVal = prixModifies[key]?.min ?? p.min;
        const maxVal = prixModifies[key]?.max ?? p.max;
        totalMin += minVal;
        totalMax += maxVal;
      });
      const fourchette = totalMin > 0 || totalMax > 0 ? `${totalMin.toLocaleString('fr-FR')} - ${totalMax.toLocaleString('fr-FR')} €` : t.fourchette;

      // Table des postes
      const postesHTML = `<table class="postes-table">
        <thead><tr><th>Prio</th><th>Poste</th><th>Intervenant</th><th>Min (€)</th><th>Max (€)</th><th>Unité</th></tr></thead>
        <tbody>${t.postes.map(p => {
          const key = `${t.code}_${p.nom}`;
          const minVal = prixModifies[key]?.min ?? p.min;
          const maxVal = prixModifies[key]?.max ?? p.max;
          const dotClass = p.prio === 'rouge' ? 'rouge' : p.prio === 'orange' ? 'orange' : p.prio === 'jaune' ? 'jaune' : p.prio === 'vert' ? 'vert' : 'gris';
          return `<tr>
            <td><span class="prio-dot ${dotClass}"></span></td>
            <td><strong>${p.nom}</strong>${p.detail ? `<br><span style="font-size:10px;color:var(--text-muted)">${p.detail}</span>` : ''}</td>
            <td style="font-size:11px;color:var(--text-muted)">${p.intervenant}</td>
            <td><input class="prix-input" type="number" value="${minVal}" onchange="setPrix('${t.code}','${p.nom}','min',this.value)" /></td>
            <td><input class="prix-input" type="number" value="${maxVal}" onchange="setPrix('${t.code}','${p.nom}','max',this.value)" /></td>
            <td style="font-size:11px;color:var(--text-muted)">${p.unite}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
      <div class="fourchette-globale">
        <span>Fourchette globale estimée</span>
        <strong id="fg-${t.code}">${fourchette}</strong>
      </div>`;

      html += `<div class="travaux-item" id="ti-${t.code}">
        <div class="travaux-header" onclick="toggleTravaux('${t.code}')">
          <div class="travaux-check ${checked?'checked':''}"></div>
          <span class="travaux-code">${t.code}</span>
          <span class="travaux-nom">${t.nom}${isSuggested?'<span class="suggestion-badge">💡 Suggéré</span>':''}</span>
          <span class="travaux-fourchette" id="fh-${t.code}">${fourchette}</span>
        </div>
        <div class="travaux-detail ${checked?'open':''}" id="td-${t.code}">
          <p class="travaux-declencheur">📌 ${t.declencheur}</p>
          ${postesHTML}
          <div class="prio-group" style="margin-top:10px">
            <button class="prio-btn p1 ${prio==='1'?'active':''}" onclick="setPrio('${t.code}','1',event)">🔴 Urgent</button>
            <button class="prio-btn p2 ${prio==='2'?'active':''}" onclick="setPrio('${t.code}','2',event)">🟠 Important</button>
            <button class="prio-btn p3 ${prio==='3'?'active':''}" onclick="setPrio('${t.code}','3',event)">🟡 Souhaitable</button>
          </div>
          <textarea class="travaux-note" placeholder="Notes spécifiques à ce travail..." onchange="setTravauxNote('${t.code}',this.value)">${travauxCoches[t.code]?.note||''}</textarea>
        </div>
      </div>`;
    });
    html += '</div>';
  });

  return html + `<div class="enveloppe-bar">
    <div class="enveloppe-title">💰 Enveloppe travaux totale estimée</div>
    <div class="enveloppe-grid">
      <div><div class="enveloppe-num" id="env-min">—</div><div class="enveloppe-label">Minimum</div></div>
      <div><div class="enveloppe-num" id="env-mid">—</div><div class="enveloppe-label">Médian</div></div>
      <div><div class="enveloppe-num" id="env-max">—</div><div class="enveloppe-label">Maximum</div></div>
    </div>
    <p style="font-size:11px;color:var(--text-muted);margin-top:8px;text-align:center">${Object.values(travauxCoches).filter(v=>v.checked).length} lot(s) sélectionné(s)</p>
  </div>`;
}

function calculerScore5Piliers() {
  const scores = {
    structure: ['fondations_etat','murs_etat','planchers_etat','escaliers_etat'],
    energie: ['isolation_murs_etat','isolation_plancher_bas_etat','isolation_toiture_etat','chauffage_etat'],
    technique: ['elec_etat','plomberie_etat'],
    etat: ['facades_etat','sols_etat','plafonds_etat','cloisons_etat','cuisine_etat','sdb_etat'],
    pathologies: ['pathologie_humidite','pathologie_fissures','pathologie_amiante','pathologie_termites'],
  };

  const piliers = {};
  Object.entries(scores).forEach(([pilier, keys]) => {
    const vals = keys.map(k => saisie[k]).filter(Boolean);
    if (!vals.length) { piliers[pilier] = 'neutre'; return; }

    if (pilier === 'pathologies') {
      const graves = ['Remontées capillaires','Infiltrations','Dégâts importants','Fissures évolutives','Lézardes (urgence BET)','Diagnostic requis','Confirmé'];
      const moyens = ['Légère condensation','Fissures non évolutives','Fissures capillaires (esthétique)','Possible (dalles sol)','Possible (flocage plafond)','Traces suspectes','Zone à risque'];
      if (vals.some(v => graves.includes(v))) piliers[pilier] = 'rouge';
      else if (vals.some(v => moyens.includes(v))) piliers[pilier] = 'orange';
      else piliers[pilier] = 'vert';
    } else {
      const nb = vals.length;
      const mauvais = vals.filter(v => v === 'mauvais').length;
      const moyen = vals.filter(v => v === 'moyen').length;
      if (mauvais / nb >= 0.4) piliers[pilier] = 'rouge';
      else if ((mauvais + moyen) / nb >= 0.4) piliers[pilier] = 'orange';
      else piliers[pilier] = 'vert';
    }
  });
  return piliers;
}

function renderSynthese() {
  const checked = Object.entries(travauxCoches).filter(([,v])=>v.checked);
  const scores = calculerScore5Piliers();

  const scoreLabel = { vert: 'Bon état', orange: 'Vigilance', rouge: 'Alerte', neutre: 'Non évalué' };
  const pilierDef = [
    { key:'structure', icon:'🧱', label:'Structure' },
    { key:'energie', icon:'⚡', label:'Énergie' },
    { key:'technique', icon:'🔌', label:'Technique' },
    { key:'etat', icon:'🏠', label:'État général' },
    { key:'pathologies', icon:'⚠️', label:'Pathologies' },
  ];

  const pilierHTML = pilierDef.map(p => `
    <div class="pilier ${scores[p.key]}">
      <div class="pilier-icon">${p.icon}</div>
      <div class="pilier-label">${p.label}</div>
      <div class="pilier-score">${scoreLabel[scores[p.key]]}</div>
    </div>`).join('');

  const travauxHTML = checked.length ? checked.map(([code, data]) => {
    const t = BIBLIOTHEQUE.find(x=>x.code===code);
    if (!t) return '';
    let min = 0, max = 0;
    t.postes.forEach(p => {
      const key = `${t.code}_${p.nom}`;
      min += prixModifies[key]?.min ?? p.min;
      max += prixModifies[key]?.max ?? p.max;
    });
    const prioLabel = data.priorite==='1'?'🔴 Urgent':data.priorite==='2'?'🟠 Important':'🟡 Souhaitable';
    const fourchette = min > 0 || max > 0 ? `${min.toLocaleString('fr-FR')} - ${max.toLocaleString('fr-FR')} €` : t.fourchette;
    return `<div class="briefing-item"><span class="briefing-label">${t.code} — ${t.nom}</span><span class="briefing-value">${fourchette}${data.priorite?' · '+prioLabel:''}</span></div>`;
  }).join('') : '<p style="font-size:13px;color:var(--text-muted)">Aucun travail sélectionné</p>';

  return `
    <div class="card">
      <div class="card-title">📊 Scoring technique — 5 piliers</div>
      <div class="pilier-grid">${pilierHTML}</div>
      <p style="font-size:11px;color:var(--text-muted);text-align:center">Scoring calculé automatiquement depuis les observations terrain</p>
    </div>
    <div class="card"><div class="card-title">📋 Données terrain</div>
      <div class="briefing-item"><span class="briefing-label">Surface mesurée</span><span class="briefing-value">${saisie.surface_mesuree||'—'} m²</span></div>
      <div class="briefing-item"><span class="briefing-label">Dernière rénovation</span><span class="briefing-value">${saisie.annee_derniere_renovation||'—'}</span></div>
      <div class="briefing-item"><span class="briefing-label">Construction</span><span class="briefing-value">${saisie.type_construction||'—'}</span></div>
      <div class="briefing-item"><span class="briefing-label">Chauffage</span><span class="briefing-value">${saisie.chauffage_type||'—'} / ${saisie.emetteurs_chauffage||'—'}</span></div>
      <div class="briefing-item"><span class="briefing-label">Assainissement</span><span class="briefing-value">${saisie.assainissement||'—'}</span></div>
      <div class="briefing-item"><span class="briefing-label">Alimentation eau</span><span class="briefing-value">${saisie.plomberie_alimentation||'—'}</span></div>
      <div class="briefing-item"><span class="briefing-label">Évacuation</span><span class="briefing-value">${saisie.plomberie_evacuation||'—'}</span></div>
    </div>
    <div class="card"><div class="card-title">🔧 Travaux identifiés</div>${travauxHTML}</div>
    <div class="enveloppe-bar">
      <div class="enveloppe-title">💰 Enveloppe travaux totale estimée</div>
      <div class="enveloppe-grid">
        <div><div class="enveloppe-num" id="env-min">—</div><div class="enveloppe-label">Minimum</div></div>
        <div><div class="enveloppe-num" id="env-mid">—</div><div class="enveloppe-label">Médian</div></div>
        <div><div class="enveloppe-num" id="env-max">—</div><div class="enveloppe-label">Maximum</div></div>
      </div>
    </div>
    <div class="card"><div class="card-title">📝 Observations techniques</div>
      ${txt('avis_global','','Synthèse de la visite — constats factuels, points de vigilance majeurs, travaux prioritaires...')}
    </div>`;
}

function renderPhotoZone(zone) {
  const photos = photosData[zone] || [];
  const thumbs = photos.map((p, i) => `
    <div class="photo-thumb"><img src="${p.data}" /><button class="del" onclick="supprimerPhoto('${zone}',${i})">×</button></div>`).join('');
  return `<div class="photo-zone">
    <input type="file" accept="image/*" multiple capture="environment" onchange="ajouterPhotos('${zone}',this)" />
    📷 Ajouter des photos
  </div><div class="photo-grid" id="photos-${zone}">${thumbs}</div>`;
}

async function ajouterPhotos(zone, input) {
  if (!photosData[zone]) photosData[zone] = [];
  for (const file of Array.from(input.files)) {
    if (file.size > 5 * 1024 * 1024) continue;
    const data = await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.readAsDataURL(file);
    });
    photosData[zone].push({ data, nom: file.name, zone, ts: Date.now() });
  }
  const grid = document.getElementById('photos-' + zone);
  if (grid) grid.innerHTML = photosData[zone].map((p, i) => `
    <div class="photo-thumb"><img src="${p.data}" /><button class="del" onclick="supprimerPhoto('${zone}',${i})">×</button></div>`).join('');
  planifierSauvegarde();
}

function supprimerPhoto(zone, idx) {
  if (!photosData[zone]) return;
  photosData[zone].splice(idx, 1);
  const grid = document.getElementById('photos-' + zone);
  if (grid) grid.innerHTML = photosData[zone].map((p, i) => `
    <div class="photo-thumb"><img src="${p.data}" /><button class="del" onclick="supprimerPhoto('${zone}',${i})">×</button></div>`).join('');
  planifierSauvegarde();
}

function toggleTravaux(code) {
  if (!travauxCoches[code]) travauxCoches[code] = { checked: false };
  travauxCoches[code].checked = !travauxCoches[code].checked;
  const check = document.querySelector(`#ti-${code} .travaux-check`);
  const detail = document.getElementById(`td-${code}`);
  if (check) check.className = 'travaux-check' + (travauxCoches[code].checked ? ' checked' : '');
  if (detail) detail.className = 'travaux-detail' + (travauxCoches[code].checked ? ' open' : '');
  calculerEnveloppe();
  planifierSauvegarde();
}

function setPrix(tCode, posteNom, minMax, val) {
  const key = `${tCode}_${posteNom}`;
  if (!prixModifies[key]) prixModifies[key] = {};
  prixModifies[key][minMax] = parseInt(val) || 0;

  // Recalcule la fourchette du lot
  const t = BIBLIOTHEQUE.find(x => x.code === tCode);
  if (t) {
    let min = 0, max = 0;
    t.postes.forEach(p => {
      const k = `${tCode}_${p.nom}`;
      min += prixModifies[k]?.min ?? p.min;
      max += prixModifies[k]?.max ?? p.max;
    });
    const fmt = `${min.toLocaleString('fr-FR')} - ${max.toLocaleString('fr-FR')} €`;
    const fh = document.getElementById(`fh-${tCode}`);
    const fg = document.getElementById(`fg-${tCode}`);
    if (fh) fh.textContent = fmt;
    if (fg) fg.textContent = fmt;
  }
  calculerEnveloppe();
  planifierSauvegarde();
}

function setPrio(code, prio, e) {
  e.stopPropagation();
  if (!travauxCoches[code]) travauxCoches[code] = { checked: true };
  travauxCoches[code].priorite = prio;
  document.querySelectorAll(`#td-${code} .prio-btn`).forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  planifierSauvegarde();
}

function setTravauxNote(code, val) {
  if (!travauxCoches[code]) travauxCoches[code] = { checked: true };
  travauxCoches[code].note = val;
  planifierSauvegarde();
}

function calculerEnveloppe() {
  let totalMin = 0, totalMax = 0;
  Object.entries(travauxCoches).forEach(([code, data]) => {
    if (!data.checked) return;
    const t = BIBLIOTHEQUE.find(x => x.code === code);
    if (!t) return;
    t.postes.forEach(p => {
      const key = `${code}_${p.nom}`;
      totalMin += prixModifies[key]?.min ?? p.min;
      totalMax += prixModifies[key]?.max ?? p.max;
    });
  });
  const fmt = n => n > 0 ? n.toLocaleString('fr-FR') + ' €' : '—';
  const mid = Math.round((totalMin + totalMax) / 2);
  document.querySelectorAll('#env-min').forEach(el => el.textContent = fmt(totalMin));
  document.querySelectorAll('#env-mid').forEach(el => el.textContent = fmt(mid));
  document.querySelectorAll('#env-max').forEach(el => el.textContent = fmt(totalMax));
}

function setScore(key, val, group) {
  saisie[key] = val;
  group.querySelectorAll('.score-btn').forEach(b => b.classList.toggle('active', b.classList.contains(val)));
  planifierSauvegarde();
}

function bindInputs() {
  document.querySelectorAll('[data-key]').forEach(el => {
    el.addEventListener('change', () => { saisie[el.dataset.key] = el.value; planifierSauvegarde(); });
    el.addEventListener('input', () => { saisie[el.dataset.key] = el.value; planifierSauvegarde(); });
  });
}

function planifierSauvegarde() {
  clearTimeout(saveTimer);
  document.getElementById('save-dot').className = 'save-dot';
  document.getElementById('save-status-txt').textContent = 'Modifications...';
  saveTimer = setTimeout(sauvegarder, 2000);
}

async function sauvegarder() {
  if (!currentMission) return;
  const missionId = currentMission.missionId;
  if (!missionId) return;
  await dbSave({ missionId, briefing: currentMission, saisie, travauxCoches, photosData, prixModifies, savedAt: new Date().toISOString() });
  document.getElementById('save-dot').className = 'save-dot saved';
  document.getElementById('save-status-txt').textContent = 'Sauvegardé ' + new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
}
