<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AQYMO — Saisie terrain</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8f7f4; --surface: #ffffff; --border: #e4e2db; --border-strong: #c8c6be;
      --text: #1a1a18; --text-secondary: #5c5b57; --text-muted: #9c9a94; --radius: 8px;
      --gold: #B8962E; --gold-bg: #faf6ee; --gold-border: #e8d9b5;
      --danger-bg: #fef2f2; --danger-text: #991b1b; --danger-border: #fecaca;
      --warning-bg: #fffbeb; --warning-text: #92400e;
      --success-bg: #f0fdf4; --success-text: #166534; --success-border: #bbf7d0;
      --red: #ef4444; --orange: #f59e0b; --green: #22c55e;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .header { background: var(--text); color: white; padding: 0.75rem 1.25rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .header img { height: 32px; width: auto; mix-blend-mode: screen; }
    .header-tag { font-size: 11px; color: #888; margin-left: 8px; }
    .offline-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #333; color: #aaa; }
    .offline-badge.online { background: var(--success-bg); color: var(--success-text); }
    .mission-bar { background: var(--gold-bg); border-bottom: 1px solid var(--gold-border); padding: 0.75rem 1.25rem; }
    .mission-select { width: 100%; padding: 8px 12px; border: 1px solid var(--gold-border); border-radius: var(--radius); font-size: 14px; font-family: 'Inter', sans-serif; background: white; color: var(--text); outline: none; }
    .mission-select:focus { border-color: var(--gold); }
    .section-nav { display: flex; overflow-x: auto; gap: 0; background: var(--surface); border-bottom: 1px solid var(--border); scrollbar-width: none; }
    .section-nav::-webkit-scrollbar { display: none; }
    .nav-btn { flex-shrink: 0; padding: 10px 14px; font-size: 12px; font-weight: 500; color: var(--text-muted); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; font-family: 'Inter', sans-serif; }
    .nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .content { padding: 1rem 1.25rem; max-width: 760px; margin: 0 auto; padding-bottom: 100px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
    .card-title { font-size: 11px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem; }
    .briefing-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .briefing-item:last-child { border-bottom: none; }
    .briefing-label { color: var(--text-muted); min-width: 130px; flex-shrink: 0; }
    .briefing-value { color: var(--text); font-weight: 500; }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 5px; }
    .field input, .field select, .field textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; font-family: 'Inter', sans-serif; color: var(--text); background: white; outline: none; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--gold); }
    .field textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .score-group { display: flex; gap: 8px; }
    .score-btn { flex: 1; padding: 10px 6px; border-radius: var(--radius); border: 1.5px solid var(--border); background: white; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; text-align: center; }
    .score-btn.bon { color: var(--success-text); }
    .score-btn.bon.active { background: var(--success-bg); border-color: var(--success-text); }
    .score-btn.moyen { color: var(--warning-text); }
    .score-btn.moyen.active { background: var(--warning-bg); border-color: var(--orange); }
    .score-btn.mauvais { color: var(--danger-text); }
    .score-btn.mauvais.active { background: var(--danger-bg); border-color: var(--red); }
    .score-btn.nd { color: var(--text-muted); }
    .score-btn.nd.active { background: var(--bg); border-color: var(--border-strong); }
    .travaux-item { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
    .travaux-header { display: flex; align-items: center; gap: 10px; padding: 10px 12px; cursor: pointer; background: white; }
    .travaux-header:hover { background: var(--bg); }
    .travaux-check { width: 18px; height: 18px; border: 2px solid var(--border-strong); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .travaux-check.checked { background: var(--gold); border-color: var(--gold); }
    .travaux-check.checked::after { content: '✓'; color: white; font-size: 11px; font-weight: 700; }
    .travaux-code { font-size: 10px; font-weight: 700; color: var(--text-muted); min-width: 36px; }
    .travaux-nom { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; }
    .travaux-fourchette { font-size: 11px; color: var(--gold); font-weight: 500; white-space: nowrap; }
    .travaux-detail { padding: 10px 12px; background: var(--gold-bg); border-top: 1px solid var(--gold-border); display: none; }
    .travaux-detail.open { display: block; }
    .travaux-detail p { font-size: 12px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 8px; }
    .deps-list { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
    .dep-pill { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: white; border: 1px solid var(--gold-border); color: var(--gold); font-weight: 500; }
    .prio-group { display: flex; gap: 6px; margin-bottom: 8px; }
    .prio-btn { flex: 1; padding: 6px; border-radius: 4px; border: 1px solid var(--border); background: white; font-size: 11px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
    .prio-btn.p1.active { background: var(--danger-bg); border-color: var(--red); color: var(--danger-text); }
    .prio-btn.p2.active { background: var(--warning-bg); border-color: var(--orange); color: var(--warning-text); }
    .prio-btn.p3.active { background: var(--gold-bg); border-color: var(--gold-border); color: var(--gold); }
    .travaux-note { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; font-family: 'Inter', sans-serif; resize: none; outline: none; min-height: 50px; background: white; }
    .photo-zone { border: 1.5px dashed var(--gold-border); border-radius: var(--radius); padding: 1rem; text-align: center; cursor: pointer; position: relative; background: var(--gold-bg); margin-bottom: 8px; }
    .photo-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 8px; }
    .photo-thumb { position: relative; aspect-ratio: 1; border-radius: 6px; overflow: hidden; }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .photo-thumb .del { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .enveloppe-bar { background: var(--surface); border: 1px solid var(--gold-border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .enveloppe-title { font-size: 11px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.75rem; }
    .enveloppe-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; }
    .enveloppe-num { font-size: 20px; font-weight: 600; color: var(--text); }
    .enveloppe-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
    .vigilance-list { list-style: none; }
    .vigilance-item { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.5; }
    .vigilance-item:last-child { border-bottom: none; }
    .dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
    .dot-red { background: var(--red); }
    .dot-orange { background: var(--orange); }
    .dot-green { background: var(--green); }
    .dot-gold { background: var(--gold); }
    .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--text); padding: 0.75rem 1.25rem; display: flex; align-items: center; gap: 10px; z-index: 100; }
    .save-btn { flex: 1; padding: 11px; background: var(--gold); color: white; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; }
    .save-status { font-size: 11px; color: #888; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
    .save-dot { width: 6px; height: 6px; border-radius: 50%; background: #555; flex-shrink: 0; }
    .save-dot.saved { background: var(--green); }
    .empty { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
    .spinner { width: 32px; height: 32px; border: 2px solid var(--gold-border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 520px) { .row { grid-template-columns: 1fr; } .enveloppe-grid { grid-template-columns: 1fr; } }
  </style>
</head>

let currentMission = null;

let db;

function updateNetworkBadge() {
  const badge = document.getElementById('network-badge');
  if (navigator.onLine) { badge.textContent = '🟢 En ligne'; badge.className = 'offline-badge online'; }
  else { badge.textContent = '⚡ Hors ligne'; badge.className = 'offline-badge'; }
}
window.addEventListener('online', updateNetworkBadge);
window.addEventListener('offline', updateNetworkBadge);
updateNetworkBadge();

function initDB() {
  return new Promise((resolve) => {
    const req = indexedDB.open('aqymo_terrain', 1);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('saisies')) d.createObjectStore('saisies', { keyPath: 'missionId' });
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(); };
    req.onerror = () => resolve();
  });
}

function dbSave(data) {
  return new Promise((resolve) => {
    if (!db) return resolve();
    const tx = db.transaction('saisies', 'readwrite');
    tx.objectStore('saisies').put(data);
    tx.oncomplete = resolve;
    tx.onerror = resolve;
  });
}

function dbGet(key) {
  return new Promise((resolve) => {
    if (!db) return resolve(null);
    const tx = db.transaction('saisies', 'readonly');
    const req = tx.objectStore('saisies').get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => resolve(null);
  });
}

async function chargerListeMissions() {
  try {
    const res = await fetch('/api/briefing?t=' + Date.now());
    if (!res.ok) return;
    const data = await res.json();
    const select = document.getElementById('mission-select');
    select.innerHTML = '<option value="">— Sélectionner une mission —</option>';
    (data.missions || []).forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.missionId;
      const statut = m._status === 'ready' ? '✅' : m._status === 'error' ? '❌' : '⏳';
      const date = m.createdAt ? new Date(m.createdAt).toLocaleDateString('fr-FR') : '';
      opt.textContent = `${statut} ${m.adresse || 'Mission'} — ${date}`;
      select.appendChild(opt);
    });
  } catch (e) {}
}

async function chargerMission(missionId) {
  if (!missionId) return;

  document.getElementById('section-nav').style.display = 'none';
  document.getElementById('bottom-bar').style.display = 'none';
  document.getElementById('content').innerHTML = `
    <div class="empty">
      <div class="spinner"></div>
      <p>Chargement de la mission...</p>
    </div>`;

  try {
    // Local d'abord
    const local = await dbGet(missionId);
    if (local?.briefing?._status === 'ready') {
      currentMission = local.briefing;
      saisie = local.saisie || {};
      travauxCoches = local.travauxCoches || {};
      photosData = local.photosData || {};
      afficherMission();
      return;
    }

    // Depuis Redis
    const res = await fetch(`/api/briefing?id=${missionId}&t=${Date.now()}`);
    const data = await res.json();

    if (data._status === 'ready') {
      currentMission = data;
      saisie = {};
      travauxCoches = {};
      photosData = {};
      afficherMission();
      return;
    }

    if (data._status === 'error') {
      document.getElementById('content').innerHTML = `<div class="empty"><p>❌ Erreur : ${data.error}</p></div>`;
      return;
    }

    // Pending → lance l'analyse et attend
    document.getElementById('content').innerHTML = `
      <div class="empty">
        <div class="spinner"></div>
        <p style="margin-bottom:8px;font-weight:500">Analyse IA en cours...</p>
        <p style="font-size:12px;color:var(--text-muted)">Interrogation des bases officielles + IA<br>Merci de patienter 1-2 minutes</p>
      </div>`;

    try {
      await fetch('/api/process', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ missionId })
      });
    } catch (e) {}

    // Récupère le résultat
    const r2 = await fetch(`/api/briefing?id=${missionId}&t=${Date.now()}`);
    const d2 = await r2.json();

    if (d2._status === 'ready') {
      currentMission = d2;
      saisie = {};
      travauxCoches = {};
      photosData = {};
      afficherMission();
    } else {
      document.getElementById('content').innerHTML = `<div class="empty"><p>❌ Analyse incomplète — réessayez dans quelques instants</p></div>`;
    }

  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="empty"><p>❌ ${e.message}</p></div>`;
  }
}

function afficherMission() {
  document.getElementById('section-nav').style.display = 'flex';
  document.getElementById('bottom-bar').style.display = 'flex';
  afficherSection('briefing', document.querySelector('.nav-btn'));
}

function afficherSection(section, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const content = document.getElementById('content');
  switch(section) {
    case 'briefing': content.innerHTML = renderBriefing(); break;
    case 'general': content.innerHTML = renderGeneral(); break;
    case 'structure': content.innerHTML = renderStructure(); break;
    case 'toiture': content.innerHTML = renderToiture(); break;
    case 'facades': content.innerHTML = renderFacades(); break;
    case 'energie': content.innerHTML = renderEnergie(); break;
    case 'electricite': content.innerHTML = renderElectricite(); break;
    case 'plomberie': content.innerHTML = renderPlomberie(); break;
    case 'interieurs': content.innerHTML = renderInterieurs(); break;
    case 'pathologies': content.innerHTML = renderPathologies(); break;
    case 'travaux': content.innerHTML = renderTravaux(); break;
    case 'synthese': content.innerHTML = renderSynthese(); break;
  }
  bindInputs();
  calculerEnveloppe();
}

  </div><div class="photo-grid" id="photos-${zone}">${thumbs}</div>`;

async function ajouterPhotos(zone, input) {
  if (!photosData[zone]) photosData[zone] = [];
  for (const file of Array.from(input.files)) {
    if (file.size > 5 * 1024 * 1024) continue;
    const data = await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.readAsDataURL(file);
    });
    photosData[zone].push({ data, nom: file.name, zone, ts: Date.now() });
  }
  const grid = document.getElementById('photos-' + zone);
  if (grid) grid.innerHTML = photosData[zone].map((p, i) => `
    <div class="photo-thumb"><img src="${p.data}" /><button class="del" onclick="supprimerPhoto('${zone}',${i})">×</button></div>`).join('');
  planifierSauvegarde();
}

function supprimerPhoto(zone, idx) {
  if (!photosData[zone]) return;
  photosData[zone].splice(idx, 1);
  const grid = document.getElementById('photos-' + zone);
  if (grid) grid.innerHTML = photosData[zone].map((p, i) => `
    <div class="photo-thumb"><img src="${p.data}" /><button class="del" onclick="supprimerPhoto('${zone}',${i})">×</button></div>`).join('');
  planifierSauvegarde();
}

function toggleTravaux(code) {
  if (!travauxCoches[code]) travauxCoches[code] = { checked: false };
  travauxCoches[code].checked = !travauxCoches[code].checked;
  const check = document.querySelector(`#ti-${code} .travaux-check`);
  const detail = document.getElementById(`td-${code}`);
  if (check) check.className = 'travaux-check' + (travauxCoches[code].checked ? ' checked' : '');
  if (detail) detail.className = 'travaux-detail' + (travauxCoches[code].checked ? ' open' : '');
  calculerEnveloppe();
  planifierSauvegarde();
}

function setPrio(code, prio, e) {
  e.stopPropagation();
  if (!travauxCoches[code]) travauxCoches[code] = { checked: true };
  travauxCoches[code].priorite = prio;
  document.querySelectorAll(`#td-${code} .prio-btn`).forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  planifierSauvegarde();
}

function setTravauxNote(code, val) {
  if (!travauxCoches[code]) travauxCoches[code] = { checked: true };
  travauxCoches[code].note = val;
  planifierSauvegarde();
}

function calculerEnveloppe() {
  let totalMin = 0, totalMax = 0;
  Object.entries(travauxCoches).forEach(([code, data]) => {
    if (!data.checked) return;
    const t = BIBLIOTHEQUE.find(x => x.code === code);
    if (!t) return;
    const nums = t.fourchette.match(/[\d\s]+/g);
    if (nums && nums.length >= 2) {
      const min = parseInt(nums[0].replace(/\s/g,''));
      const max = parseInt(nums[1].replace(/\s/g,''));
      if (!isNaN(min) && !isNaN(max)) { totalMin += min; totalMax += max; }
    }
  });
  const fmt = n => n > 0 ? n.toLocaleString('fr-FR') + ' €' : '—';
  const mid = Math.round((totalMin + totalMax) / 2);
  document.querySelectorAll('#env-min').forEach(el => el.textContent = fmt(totalMin));
  document.querySelectorAll('#env-mid').forEach(el => el.textContent = fmt(mid));
  document.querySelectorAll('#env-max').forEach(el => el.textContent = fmt(totalMax));
}

function setScore(key, val, group) {
  saisie[key] = val;
  group.querySelectorAll('.score-btn').forEach(b => b.classList.toggle('active', b.classList.contains(val)));
  planifierSauvegarde();
}

function bindInputs() {
  document.querySelectorAll('[data-key]').forEach(el => {
    el.addEventListener('change', () => { saisie[el.dataset.key] = el.value; planifierSauvegarde(); });
    el.addEventListener('input', () => { saisie[el.dataset.key] = el.value; planifierSauvegarde(); });
  });
}

function planifierSauvegarde() {
  clearTimeout(saveTimer);
  document.getElementById('save-dot').className = 'save-dot';
  document.getElementById('save-status-txt').textContent = 'Modifications...';
  saveTimer = setTimeout(sauvegarder, 2000);
}

async function sauvegarder() {
  if (!currentMission) return;
  const missionId = currentMission.missionId;
  if (!missionId) return;
  await dbSave({ missionId, briefing: currentMission, saisie, travauxCoches, photosData, savedAt: new Date().toISOString() });
  document.getElementById('save-dot').className = 'save-dot saved';
  document.getElementById('save-status-txt').textContent = 'Sauvegardé ' + new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
}

initDB().then(chargerListeMissions);
</script>
