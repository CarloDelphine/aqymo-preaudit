<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AQYMO — Saisie terrain</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8f7f4; --surface: #ffffff; --border: #e4e2db; --border-strong: #c8c6be;
      --text: #1a1a18; --text-secondary: #5c5b57; --text-muted: #9c9a94; --radius: 8px;
      --gold: #B8962E; --gold-bg: #faf6ee; --gold-border: #e8d9b5;
      --danger-bg: #fef2f2; --danger-text: #991b1b; --danger-border: #fecaca;
      --warning-bg: #fffbeb; --warning-text: #92400e; --warning-border: #fde68a;
      --success-bg: #f0fdf4; --success-text: #166534; --success-border: #bbf7d0;
      --red: #ef4444; --orange: #f59e0b; --green: #22c55e;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    
    /* HEADER */
    .header { background: var(--text); color: white; padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .header-logo { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--gold); }
    .header-tag { font-size: 11px; color: #888; margin-left: 6px; }
    .offline-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; background: #333; color: #aaa; }
    .offline-badge.online { background: var(--success-bg); color: var(--success-text); }

    /* MISSION SELECTOR */
    .mission-bar { background: var(--gold-bg); border-bottom: 1px solid var(--gold-border); padding: 0.75rem 1.25rem; }
    .mission-select { width: 100%; padding: 8px 12px; border: 1px solid var(--gold-border); border-radius: var(--radius); font-size: 14px; font-family: 'Inter', sans-serif; background: white; color: var(--text); outline: none; }
    .mission-select:focus { border-color: var(--gold); }

    /* NAV SECTIONS */
    .section-nav { display: flex; overflow-x: auto; gap: 0; background: var(--surface); border-bottom: 1px solid var(--border); scrollbar-width: none; }
    .section-nav::-webkit-scrollbar { display: none; }
    .nav-btn { flex-shrink: 0; padding: 10px 14px; font-size: 12px; font-weight: 500; color: var(--text-muted); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; transition: all 0.15s; font-family: 'Inter', sans-serif; }
    .nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .nav-btn.done { color: var(--success-text); }

    /* CONTENT */
    .content { padding: 1rem 1.25rem; max-width: 760px; margin: 0 auto; padding-bottom: 100px; }

    /* CARDS */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
    .card-title { font-size: 13px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem; }
    .briefing-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .briefing-item:last-child { border-bottom: none; }
    .briefing-label { color: var(--text-muted); min-width: 120px; flex-shrink: 0; }
    .briefing-value { color: var(--text); font-weight: 500; }

    /* FIELDS */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 5px; }
    .field input, .field select, .field textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; font-family: 'Inter', sans-serif; color: var(--text); background: white; outline: none; transition: border-color 0.15s; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--gold); }
    .field textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

    /* SCORE BUTTONS */
    .score-group { display: flex; gap: 8px; }
    .score-btn { flex: 1; padding: 10px 6px; border-radius: var(--radius); border: 1.5px solid var(--border); background: white; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: 'Inter', sans-serif; text-align: center; }
    .score-btn.bon { color: var(--success-text); }
    .score-btn.bon.active { background: var(--success-bg); border-color: var(--success-text); }
    .score-btn.moyen { color: var(--warning-text); }
    .score-btn.moyen.active { background: var(--warning-bg); border-color: var(--orange); }
    .score-btn.mauvais { color: var(--danger-text); }
    .score-btn.mauvais.active { background: var(--danger-bg); border-color: var(--red); }
    .score-btn.nd { color: var(--text-muted); }
    .score-btn.nd.active { background: var(--bg); border-color: var(--border-strong); }

    /* CHECKBOX TRAVAUX */
    .travaux-item { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
    .travaux-header { display: flex; align-items: center; gap: 10px; padding: 10px 12px; cursor: pointer; background: white; transition: background 0.15s; }
    .travaux-header:hover { background: var(--bg); }
    .travaux-check { width: 18px; height: 18px; border: 2px solid var(--border-strong); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .travaux-check.checked { background: var(--gold); border-color: var(--gold); }
    .travaux-check.checked::after { content: '✓'; color: white; font-size: 11px; font-weight: 700; }
    .travaux-code { font-size: 10px; font-weight: 700; color: var(--text-muted); min-width: 36px; }
    .travaux-nom { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; }
    .travaux-fourchette { font-size: 11px; color: var(--gold); font-weight: 500; }
    .travaux-detail { padding: 10px 12px; background: var(--gold-bg); border-top: 1px solid var(--gold-border); display: none; }
    .travaux-detail.open { display: block; }
    .travaux-detail p { font-size: 12px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 8px; }
    .deps-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .dep-pill { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: white; border: 1px solid var(--gold-border); color: var(--gold); font-weight: 500; }
    .travaux-note { width: 100%; margin-top: 8px; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; font-family: 'Inter', sans-serif; resize: none; outline: none; min-height: 50px; }
    .travaux-note:focus { border-color: var(--gold); }

    /* PRIORITÉ */
    .prio-group { display: flex; gap: 6px; margin-top: 8px; }
    .prio-btn { flex: 1; padding: 5px; border-radius: 4px; border: 1px solid var(--border); background: white; font-size: 11px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
    .prio-btn.p1.active { background: var(--danger-bg); border-color: var(--red); color: var(--danger-text); }
    .prio-btn.p2.active { background: var(--warning-bg); border-color: var(--orange); color: var(--warning-text); }
    .prio-btn.p3.active { background: var(--gold-bg); border-color: var(--gold-border); color: var(--gold); }

    /* PHOTO ZONE */
    .photo-zone { border: 1.5px dashed var(--gold-border); border-radius: var(--radius); padding: 1rem; text-align: center; cursor: pointer; position: relative; background: var(--gold-bg); margin-bottom: 8px; }
    .photo-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .photo-zone:hover { border-color: var(--gold); }
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 8px; }
    .photo-thumb { position: relative; aspect-ratio: 1; border-radius: 6px; overflow: hidden; }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .photo-thumb .del { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    /* ENVELOPPE TRAVAUX */
    .enveloppe-bar { background: var(--surface); border: 1px solid var(--gold-border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .enveloppe-title { font-size: 11px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.75rem; }
    .enveloppe-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .enveloppe-val { text-align: center; }
    .enveloppe-num { font-size: 20px; font-weight: 600; color: var(--text); }
    .enveloppe-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    /* BOTTOM BAR */
    .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--text); padding: 1rem 1.25rem; display: flex; gap: 10px; z-index: 100; }
    .save-btn { flex: 1; padding: 12px; background: var(--gold); color: white; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; }
    .save-btn:hover { opacity: 0.88; }
    .save-status { font-size: 12px; color: #888; display: flex; align-items: center; gap: 6px; }
    .save-dot { width: 6px; height: 6px; border-radius: 50%; background: #888; }
    .save-dot.saved { background: var(--green); }

    /* ALERT VIGILANCE */
    .vigilance-list { list-style: none; }
    .vigilance-item { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.5; }
    .vigilance-item:last-child { border-bottom: none; }
    .dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
    .dot-red { background: var(--red); }
    .dot-orange { background: var(--orange); }
    .dot-green { background: var(--green); }

    /* EMPTY STATE */
    .empty { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
    .empty-icon { font-size: 36px; margin-bottom: 1rem; }
    .empty p { font-size: 14px; }

    @media (max-width: 520px) { .row, .row-3 { grid-template-columns: 1fr; } .enveloppe-grid { grid-template-columns: 1fr; } }
  </style>
</head>

function updateNetworkBadge() {
  const badge = document.getElementById('network-badge');
  if (navigator.onLine) {
    badge.textContent = '🟢 En ligne';
    badge.className = 'offline-badge online';
  } else {
    badge.textContent = '⚡ Hors ligne';
    badge.className = 'offline-badge';
  }

// ============================================================
// INDEXEDDB (stockage offline)
// ============================================================
let db;
function initDB() {
  return new Promise((resolve) => {
    const req = indexedDB.open('aqymo_terrain', 1);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('saisies')) d.createObjectStore('saisies', { keyPath: 'missionId' });
      if (!d.objectStoreNames.contains('photos')) d.createObjectStore('photos', { keyPath: 'id' });
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(); };
    req.onerror = () => resolve();
  });
}

function dbSave(store, data) {
  return new Promise((resolve) => {
    if (!db) return resolve();
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).put(data);
    tx.oncomplete = resolve;
    tx.onerror = resolve;
  });
}

function dbGet(store, key) {
  return new Promise((resolve) => {
    if (!db) return resolve(null);
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => resolve(null);
  });
}

// ============================================================
// CHARGEMENT MISSIONS
// ============================================================
async function chargerListeMissions() {
  try {
    if (!navigator.onLine) return chargerMissionsLocales();
    const res = await fetch('/api/briefing');
    if (!res.ok) return;
    const data = await res.json();
    const select = document.getElementById('mission-select');
    select.innerHTML = '<option value="">— Sélectionner une mission —</option>';
    (data.missions || []).forEach(m => {
      if (m._status === 'ready') {
        const opt = document.createElement('option');
        opt.value = m.missionId;
        opt.textContent = `${m.adresse} — ${new Date(m.createdAt).toLocaleDateString('fr-FR')}`;
        select.appendChild(opt);
      }
    });
  } catch (e) { chargerMissionsLocales(); }
}

async function chargerMissionsLocales() {
  // Fallback : missions stockées en local
  const saved = JSON.parse(localStorage.getItem('aqymo_missions') || '[]');
  const select = document.getElementById('mission-select');
  select.innerHTML = '<option value="">— Sélectionner une mission —</option>';
  saved.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.missionId;
    opt.textContent = `${m.adresse} (local)`;
    select.appendChild(opt);
  });
}

async function chargerMission(missionId) {
  if (!missionId) return;
  try {
    // Essaie d'abord en local (offline)
    const local = await dbGet('saisies', missionId);
    if (local) {
      currentMission = local.briefing;
      saisie = local.saisie || {};
      travauxCoches = local.travauxCoches || {};
    } else if (navigator.onLine) {
      const res = await fetch(`/api/briefing?id=${missionId}`);
      if (!res.ok) throw new Error('Mission non trouvée');
      currentMission = await res.json();
      saisie = {};
      travauxCoches = {};
    }
    document.getElementById('section-nav').style.display = 'flex';
    document.getElementById('bottom-bar').style.display = 'flex';
    afficherSection('briefing', document.querySelector('.nav-btn'));
    calculerEnveloppe();
  } catch (e) {
    alert('Impossible de charger cette mission : ' + e.message);
  }
}

// ============================================================

// ============================================================
function afficherSection(section, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const content = document.getElementById('content');

  switch(section) {
    case 'briefing': content.innerHTML = renderBriefing(); break;
    case 'general': content.innerHTML = renderGeneral(); break;
    case 'structure': content.innerHTML = renderSection('structure', 'Structure & Gros œuvre', ['etat_fondations','etat_murs','etat_planchers','etat_escaliers','observations_structure']); break;
    case 'toiture': content.innerHTML = renderToiture(); break;
    case 'facades': content.innerHTML = renderFacades(); break;
    case 'energie': content.innerHTML = renderEnergie(); break;
    case 'electricite': content.innerHTML = renderElectricite(); break;
    case 'plomberie': content.innerHTML = renderPlomberie(); break;
    case 'interieurs': content.innerHTML = renderInterieurs(); break;
    case 'pathologies': content.innerHTML = renderPathologies(); break;
    case 'travaux': content.innerHTML = renderTravaux(); break;
    case 'synthese': content.innerHTML = renderSynthese(); break;
  }
  bindInputs();
}

        <div class="travaux-item" id="ti-${t.code}">

function renderPhotoZone(zone) {
  const photos = photosData[zone] || [];
  const thumbs = photos.map((p, i) => `
    <div class="photo-thumb">
      <img src="${p.data}" alt="photo" />
      <button class="del" onclick="supprimerPhoto('${zone}',${i})">×</button>
    </div>`).join('');
  return `
    <div class="photo-zone">
      <input type="file" accept="image/*" multiple capture="environment" onchange="ajouterPhotos('${zone}',this)" />
      📷 Ajouter des photos
    </div>
    <div class="photo-grid" id="photos-${zone}">${thumbs}</div>`;
}

async function ajouterPhotos(zone, input) {
  if (!photosData[zone]) photosData[zone] = [];
  for (const file of Array.from(input.files)) {
    if (file.size > 5 * 1024 * 1024) continue;
    const data = await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.readAsDataURL(file);
    });
    photosData[zone].push({ data, nom: file.name, zone, ts: Date.now() });
  }
  const grid = document.getElementById('photos-' + zone);
  if (grid) {
    grid.innerHTML = photosData[zone].map((p, i) => `
      <div class="photo-thumb">
        <img src="${p.data}" alt="photo" />
        <button class="del" onclick="supprimerPhoto('${zone}',${i})">×</button>
      </div>`).join('');
  }
  planifierSauvegarde();
}

function supprimerPhoto(zone, idx) {
  if (!photosData[zone]) return;
  photosData[zone].splice(idx, 1);
  const grid = document.getElementById('photos-' + zone);
  if (grid) {
    grid.innerHTML = photosData[zone].map((p, i) => `
      <div class="photo-thumb">
        <img src="${p.data}" alt="photo" />
        <button class="del" onclick="supprimerPhoto('${zone}',${i})">×</button>
      </div>`).join('');
  }
  planifierSauvegarde();
}

// ============================================================
// TRAVAUX
// ============================================================
function toggleTravaux(code) {
  if (!travauxCoches[code]) travauxCoches[code] = { checked: false };
  travauxCoches[code].checked = !travauxCoches[code].checked;
  const check = document.querySelector(`#ti-${code} .travaux-check`);
  const detail = document.getElementById(`td-${code}`);
  if (check) check.className = 'travaux-check' + (travauxCoches[code].checked ? ' checked' : '');
  if (detail) detail.className = 'travaux-detail' + (travauxCoches[code].checked ? ' open' : '');
  calculerEnveloppe();
  planifierSauvegarde();
}

function setPrio(code, prio, e) {
  e.stopPropagation();
  if (!travauxCoches[code]) travauxCoches[code] = { checked: true };
  travauxCoches[code].priorite = prio;
  document.querySelectorAll(`#td-${code} .prio-btn`).forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  planifierSauvegarde();
}

function setTravauxNote(code, val) {
  if (!travauxCoches[code]) travauxCoches[code] = { checked: true };
  travauxCoches[code].note = val;
  planifierSauvegarde();
}

function calculerEnveloppe() {
  let totalMin = 0, totalMax = 0;
  let count = 0;
  Object.entries(travauxCoches).forEach(([code, data]) => {
    if (!data.checked) return;
    const t = BIBLIOTHEQUE.find(x => x.code === code);
    if (!t) return;
    const f = t.fourchette;
    const nums = f.match(/[\d\s]+/g);
    if (nums && nums.length >= 2) {
      const min = parseInt(nums[0].replace(/\s/g, ''));
      const max = parseInt(nums[1].replace(/\s/g, ''));
      if (!isNaN(min) && !isNaN(max)) {
        totalMin += min;
        totalMax += max;
        count++;
      }
    }
  });

  const fmt = n => n > 0 ? n.toLocaleString('fr-FR') + ' €' : '—';
  const mid = Math.round((totalMin + totalMax) / 2);

  ['env-min', 'env-mid', 'env-max'].forEach(id => {
    document.querySelectorAll(`#${id}`).forEach(el => {
      if (id === 'env-min') el.textContent = fmt(totalMin);
      if (id === 'env-mid') el.textContent = fmt(mid);
      if (id === 'env-max') el.textContent = fmt(totalMax);
    });
  });
}

// ============================================================
// SCORE BUTTONS
// ============================================================
function setScore(key, val, group) {
  saisie[key] = val;
  group.querySelectorAll('.score-btn').forEach(b => {
    b.classList.toggle('active', b.classList.contains(val));
  });
  planifierSauvegarde();
}

// ============================================================
// BIND INPUTS
// ============================================================
function bindInputs() {
  document.querySelectorAll('[data-key]').forEach(el => {
    el.addEventListener('change', () => {
      saisie[el.dataset.key] = el.value;
      planifierSauvegarde();
    });
    el.addEventListener('input', () => {
      saisie[el.dataset.key] = el.value;
      planifierSauvegarde();
    });
  });
  calculerEnveloppe();
}

// ============================================================
// SAUVEGARDE
// ============================================================
function planifierSauvegarde() {
  clearTimeout(saveTimer);
  document.getElementById('save-dot').className = 'save-dot';
  document.getElementById('save-status-txt').textContent = 'Modifications en cours...';
  saveTimer = setTimeout(sauvegarder, 2000);
}

async function sauvegarder() {
  if (!currentMission) return;
  const missionId = currentMission.missionId || currentMission._missionData?.missionId;
  if (!missionId) return;

  const data = { missionId, briefing: currentMission, saisie, travauxCoches, photos: Object.keys(photosData), savedAt: new Date().toISOString() };
  await dbSave('saisies', data);

  // Sync si en ligne
  if (navigator.onLine) {
    try {
      await fetch('/api/saisie', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ missionId, saisie, travauxCoches, savedAt: data.savedAt })
      });
    } catch (e) {}
  }

  document.getElementById('save-dot').className = 'save-dot saved';
  document.getElementById('save-status-txt').textContent = 'Sauvegardé ' + new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

async function syncSiPossible() {
  if (!currentMission || !navigator.onLine) return;
  await sauvegarder();
}

initDB().then(chargerListeMissions);
